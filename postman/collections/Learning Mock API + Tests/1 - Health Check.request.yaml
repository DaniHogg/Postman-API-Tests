$kind: http-request
name: '1 - Health Check'
method: GET
url: '{{baseUrl}}/health'
order: 1000
description: |-
  Verifies the API is up and running.
  A healthy API returns 200 with a JSON body containing a `status` field.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ─── 1. Status code ───────────────────────────────────────────────────────
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      // ─── 2. Response time ─────────────────────────────────────────────────────
      pm.test('Response time is under 2000 ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // ─── 3. Content-Type header ───────────────────────────────────────────────
      pm.test('Content-Type is application/json', function () {
          pm.response.to.have.header('Content-Type');
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      // ─── 4. Body shape ────────────────────────────────────────────────────────
      pm.test('Body has a "status" field', function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property('status');
      });

      // ─── 5. Status value ──────────────────────────────────────────────────────
      pm.test('"status" value is "ok"', function () {
          const body = pm.response.json();
          pm.expect(body.status).to.eql('ok');
      });
examples: './.resources/1 - Health Check.resources/examples'
