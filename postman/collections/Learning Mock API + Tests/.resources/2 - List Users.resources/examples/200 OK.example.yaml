$kind: http-example
name: '200 OK'
request:
  url: '{{baseUrl}}/users'
  method: GET
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: 'application/json; charset=utf-8'
  body:
    type: json
    content: |-
      [
        {
          "id": 1,
          "name": "Alice Smith",
          "email": "alice@example.com",
          "role": "admin",
          "createdAt": "2024-01-10T08:00:00Z"
        },
        {
          "id": 2,
          "name": "Bob Jones",
          "email": "bob@example.com",
          "role": "user",
          "createdAt": "2024-01-11T09:30:00Z"
        }
      ]
