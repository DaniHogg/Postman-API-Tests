$kind: http-example
name: '200 OK'
request:
  url: '{{baseUrl}}/users/3'
  method: GET
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: 'application/json; charset=utf-8'
  body:
    type: json
    content: |-
      {
        "id": 3,
        "name": "Carol White",
        "email": "carol@example.com",
        "role": "user",
        "createdAt": "2024-01-15T10:05:00Z"
      }
