$kind: http-example
name: '400 Bad Request'
request:
  url: '{{baseUrl}}/users'
  method: POST
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    - key: Content-Type
      value: 'application/json; charset=utf-8'
  body:
    type: json
    content: |-
      {
        "error": "Bad Request",
        "details": [
          "email is required",
          "name must not be empty"
        ]
      }
