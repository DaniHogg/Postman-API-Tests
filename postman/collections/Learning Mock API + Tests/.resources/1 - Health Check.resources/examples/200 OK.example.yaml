$kind: http-example
name: '200 OK'
request:
  url: '{{baseUrl}}/health'
  method: GET
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: 'application/json; charset=utf-8'
  body:
    type: json
    content: |-
      {
        "status": "ok",
        "version": "1.0.0",
        "timestamp": "2024-01-15T10:00:00Z"
      }
